<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Leduc Islamic Association</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Open+Sans:wght@300;400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
      position: relative;
      overflow: hidden;
    }
    .login-page::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.06;
      background-image:
        radial-gradient(circle at 25% 25%, var(--gold) 2px, transparent 2px),
        radial-gradient(circle at 75% 75%, var(--gold) 1.5px, transparent 1.5px);
      background-size: 60px 60px;
    }
    .login-card {
      position: relative;
      background: var(--white);
      border-radius: var(--radius);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
      text-align: center;
      margin: 20px;
    }
    .login-logo {
      width: 70px;
      height: 70px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 1.8rem;
      color: var(--dark);
    }
    .login-card h1 {
      font-size: 1.6rem;
      color: var(--primary-dark);
      margin-bottom: 8px;
    }
    .login-card .subtitle {
      color: var(--text-light);
      font-size: 0.95rem;
      margin-bottom: 32px;
    }
    .login-card .form-group {
      margin-bottom: 18px;
      text-align: left;
    }
    .login-card label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .login-card input {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Open Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      transition: var(--transition);
      background: var(--off-white);
    }
    .login-card input:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(26, 86, 50, 0.1);
    }
    .login-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }
    .login-error.show { display: block; }
    .login-card .btn {
      width: 100%;
      margin-top: 8px;
    }
    .login-back {
      margin-top: 24px;
      font-size: 0.9rem;
    }
    .login-back a {
      color: var(--primary);
      text-decoration: underline;
    }
    .setup-section {
      display: none;
      text-align: left;
    }
    .setup-section.show { display: block; }
    .setup-note {
      background: #fefce8;
      border: 1px solid #fde68a;
      color: #92400e;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .password-toggle {
      position: relative;
    }
    .password-toggle i {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <i class="fas fa-user-shield"></i>
      </div>
      <h1>Admin Login</h1>
      <p class="subtitle">Leduc Islamic Association</p>

      <!-- First-time Setup -->
      <div class="setup-section" id="setupSection">
        <div class="setup-note">
          <i class="fas fa-info-circle"></i> <strong>First-time Setup:</strong> Create your admin password. Keep it safe — you'll need it to access the admin dashboard.
        </div>
        <form id="setupForm">
          <div class="form-group">
            <label>Create Password</label>
            <div class="password-toggle">
              <input type="password" id="setupPassword" placeholder="Enter a strong password" required minlength="6">
              <i class="fas fa-eye" onclick="togglePassword('setupPassword', this)"></i>
            </div>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <div class="password-toggle">
              <input type="password" id="setupPasswordConfirm" placeholder="Confirm your password" required minlength="6">
              <i class="fas fa-eye" onclick="togglePassword('setupPasswordConfirm', this)"></i>
            </div>
          </div>
          <div class="login-error" id="setupError"></div>
          <button type="submit" class="btn btn-primary">Create Admin Account</button>
        </form>
      </div>

      <!-- Login Form -->
      <div id="loginSection">
        <form id="loginForm">
          <div class="form-group">
            <label>Password</label>
            <div class="password-toggle">
              <input type="password" id="loginPassword" placeholder="Enter admin password" required>
              <i class="fas fa-eye" onclick="togglePassword('loginPassword', this)"></i>
            </div>
          </div>
          <div class="login-error" id="loginError"></div>
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-lock"></i> Sign In
          </button>
        </form>
      </div>

      <div class="login-back">
        <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
      </div>
    </div>
  </div>

  <script>
    // Simple hash function for client-side password storage
    async function hashPassword(password) {
      const encoder = new TextEncoder();
      const data = encoder.encode(password + 'LIA_SALT_2024');
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    // Check if admin is already set up
    const isSetup = localStorage.getItem('lia_admin_hash');
    if (!isSetup) {
      document.getElementById('setupSection').classList.add('show');
      document.getElementById('loginSection').style.display = 'none';
    }

    // Check if already logged in
    if (sessionStorage.getItem('lia_admin_auth') === 'true') {
      window.location.href = 'admin-dashboard.html';
    }

    // Setup form
    document.getElementById('setupForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('setupPassword').value;
      const confirm = document.getElementById('setupPasswordConfirm').value;
      const errorEl = document.getElementById('setupError');

      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.classList.add('show');
        return;
      }
      if (password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.';
        errorEl.classList.add('show');
        return;
      }

      const hash = await hashPassword(password);
      localStorage.setItem('lia_admin_hash', hash);
      sessionStorage.setItem('lia_admin_auth', 'true');
      window.location.href = 'admin-dashboard.html';
    });

    // Login form
    document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      const storedHash = localStorage.getItem('lia_admin_hash');

      const hash = await hashPassword(password);
      if (hash === storedHash) {
        sessionStorage.setItem('lia_admin_auth', 'true');
        window.location.href = 'admin-dashboard.html';
      } else {
        errorEl.textContent = 'Incorrect password. Please try again.';
        errorEl.classList.add('show');
        document.getElementById('loginPassword').value = '';
      }
    });
  </script>
</body>
</html>
