<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Leduc Islamic Association</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Open+Sans:wght@300;400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
      position: relative;
      overflow: hidden;
    }
    .login-page::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.06;
      background-image:
        radial-gradient(circle at 25% 25%, var(--gold) 2px, transparent 2px),
        radial-gradient(circle at 75% 75%, var(--gold) 1.5px, transparent 1.5px);
      background-size: 60px 60px;
    }
    .login-card {
      position: relative;
      background: var(--white);
      border-radius: var(--radius);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
      text-align: center;
      margin: 20px;
    }
    .login-logo {
      width: 70px;
      height: 70px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 1.8rem;
      color: var(--dark);
    }
    .login-card h1 {
      font-size: 1.6rem;
      color: var(--primary-dark);
      margin-bottom: 8px;
    }
    .login-card .subtitle {
      color: var(--text-light);
      font-size: 0.95rem;
      margin-bottom: 32px;
    }
    .login-card .form-group {
      margin-bottom: 18px;
      text-align: left;
    }
    .login-card label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .login-card input {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Open Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      transition: var(--transition);
      background: var(--off-white);
    }
    .login-card input:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(26, 86, 50, 0.1);
    }
    .login-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }
    .login-error.show { display: block; }
    .login-card .btn { width: 100%; margin-top: 8px; }
    .login-back {
      margin-top: 24px;
      font-size: 0.9rem;
    }
    .login-back a { color: var(--primary); text-decoration: underline; }
    .password-toggle { position: relative; }
    .password-toggle i {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--text-muted);
    }
    .loading-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <i class="fas fa-user-shield"></i>
      </div>
      <h1>Admin Login</h1>
      <p class="subtitle">Leduc Islamic Association</p>

      <!-- Login Form -->
      <div id="loginContent">
        <form id="loginForm">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="admin@example.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="password-toggle">
              <input type="password" id="loginPassword" placeholder="Enter your password" required>
              <i class="fas fa-eye" onclick="togglePassword('loginPassword', this)"></i>
            </div>
          </div>
          <div class="login-error" id="loginError"></div>
          <button type="submit" class="btn btn-primary" id="loginBtn">
            <i class="fas fa-lock"></i> Sign In
          </button>
        </form>
      </div>

      <div class="login-back">
        <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { firebaseLogin, onAuthChange, isFirebaseConfigured }
      from './firebase-config.js';

    // Check Firebase configuration
    if (!isFirebaseConfigured()) {
      document.querySelector('.login-card').innerHTML = `
        <div class="login-logo"><i class="fas fa-exclamation-triangle"></i></div>
        <h1>Setup Required</h1>
        <p class="subtitle">Firebase is not configured yet.</p>
        <p style="color: var(--text-light); font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px;">
          Open <code style="background: var(--off-white); padding: 2px 6px; border-radius: 4px;">firebase-config.js</code>
          and replace the placeholder values with your Firebase project configuration.
        </p>
        <a href="index.html" class="btn btn-primary">Back to Website</a>
      `;
      throw new Error('Firebase not configured');
    }

    // Redirect if already logged in
    onAuthChange((user) => {
      if (user) {
        window.location.href = 'admin-dashboard.html';
      }
    });

    // Password toggle
    window.togglePassword = function(inputId, icon) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    };

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      errorEl.classList.remove('show');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span> Signing in...';

      try {
        await firebaseLogin(email, password);
        // onAuthChange will redirect
      } catch (err) {
        const messages = {
          'auth/user-not-found': 'No account found with this email.',
          'auth/wrong-password': 'Incorrect password.',
          'auth/invalid-email': 'Please enter a valid email address.',
          'auth/too-many-requests': 'Too many attempts. Please try again later.',
          'auth/invalid-credential': 'Invalid email or password.',
        };
        errorEl.textContent = messages[err.code] || `Login failed: ${err.message}`;
        errorEl.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-lock"></i> Sign In';
      }
    });

  </script>
</body>
</html>
