<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Leduc Islamic Association</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Open+Sans:wght@300;400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <div id="nav-placeholder"></div>

  <!-- Page Header -->
  <section class="page-header">
    <div class="page-header-overlay"></div>
    <div class="page-header-pattern"></div>
    <div class="container">
      <h1>Contact Us</h1>
      <p>We'd love to hear from you</p>
    </div>
  </section>

  <!-- Contact Section -->
  <section class="contact" style="padding-top: 80px;">
    <div class="container">
      <div class="contact-grid">
        <div class="contact-info">
          <div class="contact-item">
            <i class="fas fa-phone"></i>
            <div>
              <h4>Phone</h4>
              <a href="tel:+15872742525">(587) 274-2525</a>
            </div>
          </div>
          <div class="contact-item">
            <i class="fas fa-envelope"></i>
            <div>
              <h4>Email</h4>
              <a href="mailto:Leducislamicassociation@gmail.com">Leducislamicassociation@gmail.com</a>
            </div>
          </div>
          <div class="contact-item">
            <i class="fas fa-location-dot"></i>
            <div>
              <h4>Location</h4>
              <p>#4 5210-50 Ave, Leduc, AB T9E 6V2</p>
            </div>
          </div>
          <div class="contact-item">
            <i class="fab fa-facebook"></i>
            <div>
              <h4>Facebook</h4>
              <a href="https://www.facebook.com/Leduc.Islamic.Centre" target="_blank" rel="noopener">Leduc Islamic Centre</a>
            </div>
          </div>
          <div class="contact-item">
            <i class="fas fa-clock"></i>
            <div>
              <h4>Open For Prayers</h4>
              <p>Open daily for all five prayers</p>
            </div>
          </div>
        </div>
        <div class="contact-form">
          <h3 style="font-size: 1.4rem; color: var(--primary-dark); margin-bottom: 20px;">Send Us a Message</h3>
          <form id="contactForm">
            <div class="form-group">
              <input type="text" id="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
              <input type="email" id="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
              <input type="text" id="subject" placeholder="Subject">
            </div>
            <div class="form-group">
              <textarea id="message" rows="5" placeholder="Your Message" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- Map -->
  <section class="about">
    <div class="container">
      <div class="section-header">
        <h2>Find Us</h2>
        <p class="section-subtitle">#4 5210-50 Ave, Leduc, AB T9E 6V2</p>
      </div>
      <div class="map-container">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2378.5!2d-113.5477!3d53.2654!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNTPCsDE1JzU1LjQiTiAxMTPCsDMyJzUxLjciVw!5e0!3m2!1sen!2sca!4v1"
          width="100%" height="400" style="border:0; border-radius: 12px;" allowfullscreen="" loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="components.js"></script>
  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadComponents('Contact');
      initContactForm();
      initScrollAnimations();
    });
  </script>
</body>
</html>
